services:
  - type: web
    name: breathe-esg
    runtime: python
    rootDir: backend
    buildCommand: |
      cd ../frontend && npm install --legacy-peer-deps && npm run build && cd ../backend
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn breathe.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
